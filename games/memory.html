<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0891b2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Memory — Sofia's Game Room</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../js/kids-core.css" />
  <link rel="stylesheet" href="memory.css" />
  <link rel="stylesheet" href="../tablet-ipad.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Sniglet:wght@400;800&display=swap" rel="stylesheet" />
</head>
<body class="page-memory">
  <div class="memory-app" id="app">
    <nav class="game-nav" aria-label="Breadcrumb">
      <a class="back-link" href="../index.html">← All games</a>
    </nav>

    <div id="screenSetup" class="memory-screen memory-screen--setup">
      <header class="memory-header">
        <h1>Memory</h1>
        <p class="memory-header__lede">
          Find matching <strong>pairs</strong>: same <strong>animal</strong> or same <strong>person</strong>. Tap a card to turn it over — only two cards stay face-up at once. Match them all!
        </p>
      </header>

      <section class="memory-card memory-card--panel" aria-labelledby="lblDifficulty">
        <h2 id="lblDifficulty">Choose your game size</h2>
        <div class="memory-choice-grid" role="radiogroup" aria-labelledby="lblDifficulty">
          <label class="memory-radio">
            <input type="radio" name="memorySize" value="quick" checked />
            <span class="memory-radio__title">Quick</span>
            <span class="memory-radio__hint">16 cards — smaller grid</span>
          </label>
          <label class="memory-radio">
            <input type="radio" name="memorySize" value="normal" />
            <span class="memory-radio__title">Normal</span>
            <span class="memory-radio__hint">24 cards — great for most</span>
          </label>
          <label class="memory-radio">
            <input type="radio" name="memorySize" value="big" />
            <span class="memory-radio__title">Big game</span>
            <span class="memory-radio__hint">30 cards — longest search</span>
          </label>
        </div>
        <button type="button" class="memory-btn memory-btn--primary" id="btnStart">Start game</button>
      </section>
    </div>

    <div id="screenPlay" class="memory-screen memory-screen--play is-hidden" hidden>
      <p class="memory-play-line">
        <span id="pairsLine" aria-live="polite"></span>
        <span id="memoryMoves" aria-live="polite"></span>
      </p>
      <div
        class="memory-board"
        id="memoryBoard"
        role="application"
        aria-label="Matching pairs — tap two cards"
      ></div>
      <p class="memory-status" id="memoryWin" role="status" aria-live="polite"></p>
      <div class="memory-play-actions">
        <button type="button" class="memory-btn memory-btn--secondary" id="btnAgainMenu">Different size</button>
        <button type="button" class="memory-btn memory-btn--primary" id="btnPlayAgain">Play again</button>
      </div>
    </div>
  </div>
  <script src="../js/kids-core.js"></script>
  <script src="memory.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("../sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
