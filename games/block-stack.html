<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#c4d6a7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="description" content="Stack falling blocks and clear rows — a Tetris-style puzzle in Sofia's Game Room." />
  <title>Block stack — Sofia's Game Room</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../js/kids-core.css" />
  <link rel="stylesheet" href="block-stack.css" />
  <link rel="stylesheet" href="../tablet-ipad.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="page-block-stack">
  <div class="block-stack-app" id="app">
    <nav class="block-stack-nav" aria-label="Breadcrumb">
      <a class="back-btn" href="../index.html" aria-label="Back to all games">
        <span class="back-btn__icon" aria-hidden="true">&#8592;</span><span class="back-btn__text">Back</span>
      </a>
    </nav>

    <div id="outer-board">
      <div id="board">
        <div id="banner">
          <div>
            <div id="message"></div>
            <div id="new-game" role="button" tabindex="0">Tap here to start!</div>
          </div>
        </div>
      </div>
      <div id="stats">
        <div class="labels">
          Scores
          <div id="score" class="frame">0</div>
        </div>
        <button type="button" class="btn btn-rounded" id="left" aria-label="Move left">←</button>
        <button type="button" class="btn btn-rounded" id="right" aria-label="Move right">→</button>
        <button type="button" class="btn btn-rounded" id="rotate" aria-label="Rotate piece">
          <span class="flipx" aria-hidden="true">↻</span>
        </button>
        <button type="button" class="btn btn-rounded" id="down" aria-label="Drop faster">↓</button>
      </div>
    </div>
    <p class="block-stack-hint">
      Arrow keys or buttons. <strong>N</strong> starts a new game. Land blocks to fill a row — it clears and adds to your score.
    </p>
  </div>
  <script src="../js/kids-core.js"></script>
  <script src="block-stack.js" defer></script>
  <script>
    if (typeof KidsCore !== "undefined") {
      KidsCore.init();
      KidsCore.bindTapSound(document.getElementById("app"));
    }
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("../sw.js").catch(function () {});
    }
  </script>
</body>
</html>
