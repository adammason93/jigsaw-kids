<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Rock paper scissors — Sofia's Game Room</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../js/kids-core.css" />
  <link rel="stylesheet" href="rock-paper-scissors.css" />
  <link rel="stylesheet" href="../tablet-ipad.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Sniglet:wght@400;800&display=swap" rel="stylesheet" />
</head>
<body class="page-rps">
  <div class="rps-app" id="app">
    <nav class="rps-nav" aria-label="Breadcrumb">
      <a class="rps-back back-btn" href="../index.html" aria-label="Back to all games"><span class="back-btn__icon" aria-hidden="true">&#8592;</span><span class="back-btn__text">Back</span></a>
    </nav>

    <main class="rps-main" aria-labelledby="rpsHeading">
      <div class="rps-card">
        <div class="rps-hero" id="rpsHero" aria-hidden="true">
          <div class="rps-hero__fist rps-hero__fist--left" id="rpsHeroLeft">
            <svg class="rps-icon rps-icon--hero" viewBox="0 0 120 140" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" d="M38 42c-4 18 2 38 16 52l8 10c6 8 16 12 26 12h6c12 0 22-10 22-22V38c0-6-5-11-11-11s-11 5-11 11v18M60 38v22M72 33v27"/>
            </svg>
          </div>
          <div class="rps-hero__fist rps-hero__fist--right" id="rpsHeroRight">
            <svg class="rps-icon rps-icon--hero" viewBox="0 0 120 140" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" d="M82 42c4 18-2 38-16 52l-8 10c-6 8-16 12-26 12h-6c-12 0-22-10-22-22V38c0-6 5-11 11-11s11 5 11 11v18M60 38v22M48 33v27"/>
            </svg>
          </div>
        </div>

        <h1 class="rps-heading" id="rpsHeading">
          <span id="rpsTitleLine">Let’s play!!</span>
        </h1>
        <p class="rps-score" id="rpsScore" aria-live="polite">You 0 · Computer 0</p>
      </div>
    </main>

    <!-- Step 1: pick -->
    <div class="rps-flow-backdrop" id="rpsFlowBackdrop" role="presentation">
      <div
        class="rps-flow-sheet"
        id="rpsFlowSheet"
        role="dialog"
        aria-modal="true"
        aria-labelledby="rpsPickTitle"
      >
        <div class="rps-flow-step" id="rpsFlowPick">
          <p class="rps-flow-score rps-flow-score--sheet" id="rpsFlowScorePick" aria-hidden="true">You 0 · Computer 0</p>
          <h2 class="rps-flow-title" id="rpsPickTitle">Pick your option!</h2>
          <p class="rps-flow-hint">Tap rock, paper, or scissors</p>
          <div class="rps-picks" id="rpsPicks" role="group" aria-label="Your move">
            <button type="button" class="rps-pick" data-move="rock" aria-label="Rock">
              <svg class="rps-icon rps-icon--pick" viewBox="0 0 120 140" aria-hidden="true">
                <path fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" d="M38 42c-4 18 2 38 16 52l8 10c6 8 16 12 26 12h6c12 0 22-10 22-22V38c0-6-5-11-11-11s-11 5-11 11v18M60 38v22M72 33v27"/>
              </svg>
              <span class="rps-pick__label">Rock</span>
            </button>
            <button type="button" class="rps-pick" data-move="paper" aria-label="Paper">
              <svg class="rps-icon rps-icon--pick" viewBox="0 0 120 140" aria-hidden="true">
                <path fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" d="M28 88c0-16 14-30 30-30 6 0 12 2 16 5 4-8 12-14 22-14 12 0 22 8 26 20 4-4 10-6 16-6 14 0 26 12 26 26v6c0 20-16 36-36 36H44c-10 0-16-6-16-14V88z"/>
                <path fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" d="M34 102l-6 28M48 98l-2 32M62 96v34M76 98l2 32M90 102l6 28"/>
              </svg>
              <span class="rps-pick__label">Paper</span>
            </button>
            <button type="button" class="rps-pick" data-move="scissors" aria-label="Scissors">
              <svg class="rps-icon rps-icon--pick" viewBox="0 0 120 140" aria-hidden="true">
                <path fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" d="M44 38 L76 118 M76 38 L44 118"/>
                <circle cx="44" cy="38" r="9" fill="none" stroke="currentColor" stroke-width="4.5"/>
                <circle cx="76" cy="38" r="9" fill="none" stroke="currentColor" stroke-width="4.5"/>
              </svg>
              <span class="rps-pick__label">Scissors</span>
            </button>
          </div>
        </div>

        <!-- Step 2: countdown -->
        <div class="rps-flow-step is-hidden" id="rpsFlowCount" aria-live="assertive">
          <p class="rps-flow-score rps-flow-score--sheet" id="rpsFlowScoreCount" aria-hidden="true">You 0 · Computer 0</p>
          <h2 class="rps-flow-title">Get ready…</h2>
          <div class="rps-countdown" id="rpsCountNum" aria-live="assertive">3</div>
        </div>

        <!-- Step 3: reveal -->
        <div class="rps-flow-step is-hidden" id="rpsFlowReveal" aria-live="polite">
          <p class="rps-flow-score rps-flow-score--sheet" id="rpsFlowScoreReveal" aria-hidden="true">You 0 · Computer 0</p>
          <h2 class="rps-flow-title rps-flow-title--small">Here’s what we played</h2>
          <div class="rps-duel rps-duel--modal">
            <div class="rps-duel__side">
              <span class="rps-duel__label">You</span>
              <div class="rps-duel__icon-wrap" id="rpsRevealYou"></div>
            </div>
            <div class="rps-duel__vs" aria-hidden="true">vs</div>
            <div class="rps-duel__side">
              <span class="rps-duel__label">Computer</span>
              <div class="rps-duel__icon-wrap" id="rpsRevealCpu"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Step 4: winner overlay -->
    <div class="rps-win-overlay is-hidden" id="rpsWinOverlay" role="dialog" aria-modal="true" aria-labelledby="rpsWinHeading">
      <div class="rps-win-panel">
        <h2 class="rps-win-heading" id="rpsWinHeading"></h2>
        <p class="rps-win-detail" id="rpsWinDetail"></p>
        <p class="rps-win-score" id="rpsWinScore" aria-live="polite"></p>
        <button type="button" class="rps-again" id="rpsAgain">Play again</button>
      </div>
    </div>
  </div>
  <script src="../js/kids-core.js" defer></script>
  <script src="rock-paper-scissors.js" defer></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("../sw.js").catch(function () {});
    }
  </script>
</body>
</html>
