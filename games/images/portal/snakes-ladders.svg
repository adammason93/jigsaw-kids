<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="snakeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f3ff"/>
      <stop offset="100%" style="stop-color:#ede9fe"/>
    </linearGradient>
  </defs>
  <rect width="320" height="240" rx="16" fill="url(#snakeBg)"/>
  <!-- serpentine track -->
  <path d="M24 200 L120 200 L120 140 L200 140 L200 80 L296 80 L296 24" fill="none" stroke="#a78bfa" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <path d="M24 200 L120 200 L120 140 L200 140 L200 80 L296 80 L296 24" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- ladder -->
  <line x1="88" y1="168" x2="88" y2="108" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <line x1="104" y1="168" x2="104" y2="108" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <line x1="88" y1="128" x2="104" y2="128" stroke="#fbbf24" stroke-width="4"/>
  <line x1="88" y1="148" x2="104" y2="148" stroke="#fbbf24" stroke-width="4"/>
  <!-- mini snake head -->
  <circle cx="276" cy="36" r="14" fill="#22c55e"/>
  <circle cx="272" cy="32" r="3" fill="#14532d"/>
  <circle cx="282" cy="32" r="3" fill="#14532d"/>
  <!-- squares hint -->
