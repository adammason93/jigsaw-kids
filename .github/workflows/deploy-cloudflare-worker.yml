# Bypass Cloudflare Workers "Git builds" when jobs stay stuck on Queued.
#
# GitHub → repo → Settings → Secrets and variables → Actions — add BOTH:
#
# CLOUDFLARE_API_TOKEN — API token with Workers deploy rights
#   https://developers.cloudflare.com/fundamentals/api/get-started/create-token/
#   Templates: “Edit Cloudflare Workers” or custom with Workers Scripts:Edit (+ Account read if prompted)
#
# CLOUDFLARE_ACCOUNT_ID — REQUIRED in CI (unless you commit account_id in wrangler.jsonc)
#   Cloudflare Dashboard → Workers & Pages overview → sidebar “Account ID”
#
# If Cloudflare Git builds also deploy this repo on push, disconnect one to avoid double deploys.

name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Cloudflare Actions secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_ACCOUNT" ]; then
            echo "::error title=Missing CLOUDFLARE_ACCOUNT_ID::Add secret CLOUDFLARE_ACCOUNT_ID (Dashboard → Workers & Pages → Account ID)."
            exit 1
          fi
          if [ -z "$CF_TOKEN" ]; then
            echo "::error title=Missing CLOUDFLARE_API_TOKEN::Add secret CLOUDFLARE_API_TOKEN (API token with Worker deploy)."
            exit 1
          fi

      - name: Publish
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
